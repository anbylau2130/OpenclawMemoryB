# Trading Agent Configuration
# 自动压缩策略配置

agent:
  id: trading
  name: 交易监控机器人
  
# Compaction 配置 - 自动压缩对话历史
compaction:
  enabled: true
  # 触发压缩的token阈值（激进配置：60K就触发）
  triggerTokens: 60000
  # 保留的最小token数（压缩后保留这么多token）
  reserveTokensFloor: 15000
  # 压缩策略
  strategy: "sliding_window"  # 滑动窗口策略
  # 保留最近的N条消息（激进配置：只保留15条）
  keepRecentMessages: 15
  # 保留系统消息
  keepSystemMessages: true
  
# 模型配置
model:
  provider: zai
  model: glm-5
  apiKey: 1b82387309894956990c24b13e4edf2a.J7nwWhssY73LVRHq
  contextWindow: 204800
  maxTokens: 131072
  
# 会话配置
session:
  maxHistorySize: 200  # 激进配置：最大历史200条
  autoCompact: true     # 自动压缩
  compactInterval: 20   # 每20条消息检查一次
  
# 上下文硬限制 - 防止 context_window_exceeded
context:
  maxTokens: 60000  # 激进配置：60K tokens（约30%上下文窗口）
  truncationStrategy: "sliding_window"  # 滑动窗口策略
  preserveSystemMessages: true  # 保留系统消息
  preserveRecentMessages: 15  # 保留最近15条消息
