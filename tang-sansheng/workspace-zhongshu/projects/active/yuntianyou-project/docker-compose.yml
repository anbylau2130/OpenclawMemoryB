version: '3.8'

services:
  backend:
    image: mcr.microsoft.com/dotnet/aspnet:8.0
    container_name: yty-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=yty_db;Username=yty;Password=yty123456
    ports:
      - "5000:5000"
    depends_on:
      - postgres

    restart: on-failure

    healthcheck:
      test: ["CMD-SHELL", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:18-alpine
    container_name: yty-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:15-alpine
    container_name: yty-postgres
    environment:
      - POSTGRES_USER=yty
      - POSTGRES_PASSWORD=yty123456
      - POSTGRES_DB=yty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    container_name: yty-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres-data:

networks:
  yty-network:
    driver: bridge

