# ==================== 监控系统 Docker Compose 配置 ====================
# 天佑平台监控系统部署配置
# 作者：兵部
# 日期：2026-03-25

version: '3.8'

services:
  # ==================== Prometheus 监控服务 ====================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: tianyou-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    networks:
      - tianyou-monitoring
    labels:
      - "com.tianyou.service=monitoring"
      - "com.tianyou.component=prometheus"

  # ==================== Grafana 可视化服务 ====================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: tianyou-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=redis-datasource
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - tianyou-monitoring
    depends_on:
      - prometheus
    labels:
      - "com.tianyou.service=monitoring"
      - "com.tianyou.component=grafana"

  # ==================== Alertmanager 告警服务 ====================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: tianyou-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    networks:
      - tianyou-monitoring
    labels:
      - "com.tianyou.service=monitoring"
      - "com.tianyou.component=alertmanager"

  # ==================== Node Exporter 节点监控 ====================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: tianyou-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - tianyou-monitoring
    labels:
      - "com.tianyou.service=monitoring"
      - "com.tianyou.component=node-exporter"

  # ==================== cAdvisor 容器监控 ====================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: tianyou-cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - tianyou-monitoring
    labels:
      - "com.tianyou.service=monitoring"
      - "com.tianyou.component=cadvisor"

  # ==================== PostgreSQL Exporter 数据库监控 ====================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.1
    container_name: tianyou-postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-tianyou}:${POSTGRES_PASSWORD:-tianyou123}@postgres:5432/tianyou_platform?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - tianyou-monitoring
    depends_on:
      - postgres
    labels:
      - "com.tianyou.service=monitoring"
      - "com.tianyou.component=postgres-exporter"

  # ==================== Redis Exporter 缓存监控 ====================
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: tianyou-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - tianyou-monitoring
    depends_on:
      - redis
    labels:
      - "com.tianyou.service=monitoring"
      - "com.tianyou.component=redis-exporter"

# ==================== 网络配置 ====================
networks:
  tianyou-monitoring:
    driver: bridge
    labels:
      - "com.tianyou.network=monitoring"

# ==================== 数据卷配置 ====================
volumes:
  prometheus-data:
    driver: local
    labels:
      - "com.tianyou.volume=prometheus"
  grafana-data:
    driver: local
    labels:
      - "com.tianyou.volume=grafana"
  alertmanager-data:
    driver: local
    labels:
      - "com.tianyou.volume=alertmanager"
