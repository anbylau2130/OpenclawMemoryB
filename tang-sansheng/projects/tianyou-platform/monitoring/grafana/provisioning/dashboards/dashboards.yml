# ==================== Grafana 仪表板配置 ====================
# 天佑平台监控配置
# 作者：兵部
# 日期：2026-03-25

apiVersion: 1

providers:
  - name: 'Tianyou Platform'
    orgId: 1
    folder: 'Tianyou'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: true
