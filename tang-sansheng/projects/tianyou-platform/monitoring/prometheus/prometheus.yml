# ==================== Prometheus 配置文件 ====================
# 天佑平台监控配置
# 作者：兵部
# 日期：2026-03-25

global:
  scrape_interval: 15s      # 默认抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    monitor: 'tianyou-platform'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 告警规则文件
rule_files:
  - /etc/prometheus/alerts/*.yml

# 抓取配置
scrape_configs:
  # ==================== Prometheus 自身监控 ====================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ==================== 后端服务监控 ====================
  - job_name: 'tianyou-backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # ==================== 前端服务监控 ====================
  - job_name: 'tianyou-frontend'
    static_configs:
      - targets: ['frontend:80']
    metrics_path: /metrics
    scrape_interval: 30s

  # ==================== PostgreSQL 数据库监控 ====================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # ==================== Redis 缓存监控 ====================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # ==================== RabbitMQ 消息队列监控 ====================
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    scrape_interval: 30s

  # ==================== Docker 容器监控 ====================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s

  # ==================== 节点监控 ====================
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

