# ==================== 天佑平台告警规则 ====================
# 作者：兵部
# 日期：2026-03-25

groups:
  # ==================== 服务可用性告警 ====================
  - name: service_availability
    interval: 30s
    rules:
      # 服务宕机告警
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          service: tianyou-platform
        annotations:
          summary: "服务宕机 - {{ $labels.instance }}"
          description: "服务 {{ $labels.job }} 已经宕机超过 1 分钟。"

      # 高错误率告警
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)
          > 0.05
        for: 5m
        labels:
          severity: warning
          service: tianyou-platform
        annotations:
          summary: "高错误率 - {{ $labels.service }}"
          description: "服务 {{ $labels.service }} 的 5xx 错误率超过 5%，当前值：{{ $value | humanizePercentage }}"

  # ==================== 性能告警 ====================
  - name: performance
    interval: 30s
    rules:
      # 高响应时间告警
      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 2
        for: 5m
        labels:
          severity: warning
          service: tianyou-platform
        annotations:
          summary: "高响应时间 - {{ $labels.service }}"
          description: "服务 {{ $labels.service }} 的 P95 响应时间超过 2 秒，当前值：{{ $value | humanizeDuration }}"

      # 高并发请求数告警
      - alert: HighConcurrentRequests
        expr: |
          sum(http_requests_in_progress) by (service) > 1000
        for: 5m
        labels:
          severity: warning
          service: tianyou-platform
        annotations:
          summary: "高并发请求数 - {{ $labels.service }}"
          description: "服务 {{ $labels.service }} 的并发请求数超过 1000，当前值：{{ $value }}"

  # ==================== 资源使用告警 ====================
  - name: resource_usage
    interval: 30s
    rules:
      # 高 CPU 使用率告警
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: tianyou-platform
        annotations:
          summary: "高 CPU 使用率 - {{ $labels.instance }}"
          description: "实例 {{ $labels.instance }} 的 CPU 使用率超过 80%，当前值：{{ $value | humanize }}%"

      # 高内存使用率告警
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: tianyou-platform
        annotations:
          summary: "高内存使用率 - {{ $labels.instance }}"
          description: "实例 {{ $labels.instance }} 的内存使用率超过 85%，当前值：{{ $value | humanize }}%"

      # 磁盘空间不足告警
      - alert: DiskSpaceLow
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: tianyou-platform
        annotations:
          summary: "磁盘空间不足 - {{ $labels.instance }}"
          description: "实例 {{ $labels.instance }} 的磁盘使用率超过 85%，当前值：{{ $value | humanize }}%"

  # ==================== 数据库告警 ====================
  - name: database
    interval: 30s
    rules:
      # PostgreSQL 连接数过高告警
      - alert: PostgreSQLTooManyConnections
        expr: |
          pg_stat_activity_count / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL 连接数过高"
          description: "PostgreSQL 连接数超过最大连接数的 80%，当前值：{{ $value | humanize }}%"

      # PostgreSQL 复制延迟告警
      - alert: PostgreSQLReplicationLag
        expr: |
          pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL 复制延迟"
          description: "PostgreSQL 复制延迟超过 30 秒，当前值：{{ $value | humanizeDuration }}"

      # PostgreSQL 死锁告警
      - alert: PostgreSQLDeadlocks
        expr: |
          rate(pg_stat_database_deadlocks[5m]) > 0
        for: 5m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL 死锁检测"
          description: "检测到 PostgreSQL 死锁，速率：{{ $value | humanize }}/s"

  # ==================== 缓存告警 ====================
  - name: cache
    interval: 30s
    rules:
      # Redis 内存使用率过高告警
      - alert: RedisHighMemoryUsage
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis 内存使用率过高"
          description: "Redis 内存使用率超过 85%，当前值：{{ $value | humanize }}%"

      # Redis 连接数过高告警
      - alert: RedisTooManyConnections
        expr: |
          redis_connected_clients / redis_config_maxclients * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis 连接数过高"
          description: "Redis 连接数超过最大连接数的 80%，当前值：{{ $value | humanize }}%"

      # Redis 键驱逐告警
      - alert: RedisKeysEvicted
        expr: |
          rate(redis_evicted_keys_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis 键被驱逐"
          description: "检测到 Redis 键被驱逐，速率：{{ $value | humanize }}/s"

  # ==================== 消息队列告警 ====================
  - name: message_queue
    interval: 30s
    rules:
      # RabbitMQ 队列积压告警
      - alert: RabbitMQQueueBacklog
        expr: |
          rabbitmq_queue_messages > 10000
        for: 5m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ 队列积压"
          description: "RabbitMQ 队列 {{ $labels.queue }} 积压消息数超过 10000，当前值：{{ $value }}"

      # RabbitMQ 消费者不足告警
      - alert: RabbitMQNoConsumers
        expr: |
          rabbitmq_queue_consumers == 0
        for: 5m
        labels:
          severity: critical
          service: rabbitmq
        annotations:
          summary: "RabbitMQ 无消费者"
          description: "RabbitMQ 队列 {{ $labels.queue }} 没有消费者"

  # ==================== 业务指标告警 ====================
  - name: business_metrics
    interval: 30s
    rules:
      # 登录失败率过高告警
      - alert: HighLoginFailureRate
        expr: |
          sum(rate(http_requests_total{endpoint="/api/auth/login", status=~"4.."}[5m]))
          /
          sum(rate(http_requests_total{endpoint="/api/auth/login"}[5m]))
          > 0.2
        for: 5m
        labels:
          severity: warning
          service: tianyou-platform
        annotations:
          summary: "登录失败率过高"
          description: "登录失败率超过 20%，可能存在安全风险，当前值：{{ $value | humanizePercentage }}"

      # API 请求速率异常告警
      - alert: APIRequestRateAnomaly
        expr: |
          abs(
            (sum(rate(http_requests_total[5m])) - sum(rate(http_requests_total[5m] offset 1h)))
            / sum(rate(http_requests_total[5m] offset 1h))
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: tianyou-platform
        annotations:
          summary: "API 请求速率异常"
          description: "API 请求速率出现异常变化，可能存在攻击或系统问题"
