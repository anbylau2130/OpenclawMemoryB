# ==================== Filebeat 配置文件 ====================
# 天佑平台日志收集配置
# 作者：兵部
# 日期：2026-03-25

# ==================== Filebeat 输入配置 ====================
filebeat.inputs:
  # 收集应用日志文件
  - type: log
    enabled: true
    paths:
      - /var/log/tianyou/*.log
      - /var/log/tianyou/**/*.log
    fields:
      service: tianyou-api
      environment: production
    fields_under_root: true
    multiline:
      pattern: '^\d{4}-\d{2}-\d{2}'
      negate: true
      match: after

  # 收集 Docker 容器日志
  - type: container
    enabled: true
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - decode_json_fields:
          fields: ["message"]
          target: "json"
          overwrite_keys: true

# ==================== Filebeat 模块 ====================
filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  reload.enabled: false

# ==================== 处理器配置 ====================
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~
  - add_fields:
      target: ''
      fields:
        app: tianyou-platform
        version: 1.0.0

# ==================== 输出配置 ====================
# 输出到 Logstash
output.logstash:
  enabled: true
  hosts: ["logstash:5044"]
  loadbalance: true
  bulk_max_size: 2048

# 输出到 Elasticsearch（可选，绕过 Logstash）
# output.elasticsearch:
#   hosts: ["elasticsearch:9200"]
#   index: "tianyou-logs-%{+yyyy.MM.dd}"
#   protocol: "http"

# ==================== Kibana 配置 ====================
setup.kibana:
  host: "kibana:5601"
  protocol: "http"

# ==================== 日志配置 ====================
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

