# 交易监控配置文件
# 作者: 小秘
# 日期: 2026-03-20
# 版本: V1.0

[monitor]
scan_interval = 60
alert_threshold = 3.5
cache_ttl = 60
watch_list_size = 10
iteration_count = 10

[volume_price]
volume_surge_threshold = 1.5
volume_shrink_threshold = 0.5
price_up_volume_up = true
price_up_volume_down = true
price_down_volume_up = true
price_down_volume_down = true

[market_sentiment]
very_bullish = 80
bullish = 60
neutral = 40
bearish = 20
very_bearish = 0
price_weight = 0.3
volume_weight = 0.25
momentum_weight = 0.2
breadth_weight = 0.15
volatility_weight = 0.1

[factors]
VWAP = 3.0
BOLL = 3.0
KDJ = 3.0
RSI = 2.0
MACD = 1.0
MA = 1.0
VOLUME = 1.0

[strategy]
position_size_short = 0.15
stop_loss_short = -0.03
take_profit_1_short = 0.06
take_profit_2_short = 0.10
take_profit_3_short = 0.20
position_size_mid = 0.20
stop_loss_mid = -0.05
take_profit_mid = 0.15
add_position_mid = 0.05
position_size_long = 0.30
stop_loss_long = -0.08
take_profit_long = 0.28
dividend_yield_long = 0.05

[risk]
max_single_position = 0.20
max_total_position = 0.80
min_cash_reserve = 0.20
short_term_stop_loss = -0.03
mid_term_stop_loss = -0.05
long_term_stop_loss = -0.08
no_chase_highs = true
no_panic_sell = true
no_over_trade = true

[report]
save_path = /root/.openclaw/workspace/trading
filename_pattern = {stock_name}-{date}-{scan_count}.md
report_interval = 3600
include_market_sentiment = true
include_volume_analysis = true
include_factor_scores = true
include_trading_advice = true
include_risk_control = true

[notification]
dingtalk_enabled = true
dingtalk_work_notice = true
notify_on_alert = true
notify_on_report = true
notify_on_trade = true
include_detailed_advice = true
