# 太子Agent配置

model:
  primary: zai/glm-5

models:
  zai/glm-5:
    alias: GLM
  zai/glm-4.7:
    alias: GLM-4.7

workspace: /root/.openclaw/workspace-taizi

contextPruning:
  mode: cache-ttl
  ttl: "1800"
  keepLastAssistants: 10
  softTrim:
    maxChars: 8000
    headChars: 3000
    tailChars: 3000
  hardClear:
    enabled: true
    placeholder: "[Old tool result content cleared]"

compaction:
  mode: safeguard
  reserveTokensFloor: 80000
  memoryFlush:
    enabled: true
    softThresholdTokens: 10000

blockStreamingDefault: "on"
blockStreamingBreak: "text_end"
timeoutSeconds: 86400
heartbeat: {}
