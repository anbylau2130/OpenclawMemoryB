# Main Agent Configuration
# 自动压缩策略配置

agent:
  id: main
  name: 骡子（日常助手）
  
# Compaction 配置 - 自动压缩对话历史
compaction:
  enabled: true
  # 触发压缩的token阈值（更激进的压缩）
  triggerTokens: 60000
  # 保留的最小token数
  reserveTokensFloor: 10000
  # 压缩策略
  strategy: "sliding_window"
  # 保留最近的N条消息
  keepRecentMessages: 15
  # 保留系统消息
  keepSystemMessages: true
  
# 模型配置
model:
  provider: zai
  model: glm-5
  contextWindow: 204800
  maxTokens: 131072
  
# 会话配置
session:
  maxHistorySize: 2000
  autoCompact: true
  compactInterval: 100
  
# 上下文硬限制 - 防止超出模型窗口
context:
  maxTokens: 60000  # 强制截断到60K tokens（约30%上下文窗口）
  truncationStrategy: "sliding_window"  # 滑动窗口策略
  preserveSystemMessages: true  # 保留系统消息
  preserveRecentMessages: 15  # 保留最近15条消息
